server {
    listen 9444 ssl;
    server_name api.lab.forge.local;

    ssl_certificate     /etc/nginx/ssl/api.crt;
    ssl_certificate_key /etc/nginx/ssl/api.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy to .NET Core API (Kestrel on port 5000)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass the Authorization header (SPNEGO/Negotiate token)
        proxy_pass_header Authorization;
        proxy_set_header Authorization $http_authorization;

        # Buffer settings for large Negotiate tokens
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # WebSocket support (future SignalR hubs)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Health check endpoint (no auth)
    location = /api/health {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }
}

